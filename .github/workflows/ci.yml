name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build server
        run: npm run build
        working-directory: server

      - name: Build client
        run: npm run build
        working-directory: client

      - name: Test server
        run: npm test
        working-directory: server
        env:
          CI: true
          NODE_ENV: test
          DATABASE_URL: mysql://ci-user:ci-pass@127.0.0.1:3306/aisthea_ci
          JWT_SECRET: 12345678901234567890123456789012
          REFRESH_SECRET: abcdefghijklmnopqrstuvwxyz123456

      - name: Test client
        run: npm test -- --run
        working-directory: client
        env:
          CI: true
